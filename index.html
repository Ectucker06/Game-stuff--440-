<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SEEN</title>

  <style>
    body {
      margin: 0;
      background: #101820;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    canvas {
      background: #111827;
      display: block;
      margin: 20px auto;
      border: 3px solid white;
    }
  </style>
</head>

<body>

<!-- AI Attribution: ChatGPT was used to help generate/debug this game. -->

<h1>SEEN</h1>
<p>Move with ← and →. Avoid staying in the light too long. Reach the green goal.</p>

<canvas id="gameCanvas" width="700" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let keys = {};

let player = {
  x: 40,
  y: 310,
  width: 35,
  height: 50,
  speed: 4
};

let visionZone = {
  x: 280,
  y: 0,
  width: 220,
  height: canvas.height
};

let goal = {
  x: 640,
  y: 285,
  width: 35,
  height: 75
};

let visibility = 0;
let gameState = "playing";

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;

  if (e.key.toLowerCase() === "r") {
    restartGame();
  }
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

function isPlayerSeen() {
  return (
    player.x < visionZone.x + visionZone.width &&
    player.x + player.width > visionZone.x
  );
}

function update() {
  if (gameState !== "playing") return;

  if (keys["ArrowLeft"] && player.x > 0) {
    player.x -= player.speed;
  }

  if (keys["ArrowRight"] && player.x + player.width < canvas.width) {
    player.x += player.speed;
  }

  if (isPlayerSeen()) {
    visibility += 0.7;
  } else {
    visibility -= 0.35;
  }

  visibility = Math.max(0, Math.min(100, visibility));

  if (player.x + player.width >= goal.x) {
    gameState = "win";
  }

  if (visibility >= 100) {
    gameState = "gameOver";
  }
}

function drawBackground() {
  ctx.fillStyle = "#0f172a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#374151";
  ctx.fillRect(0, 360, canvas.width, 40);

  ctx.fillStyle = "rgba(255, 221, 87, 0.25)";
  ctx.fillRect(visionZone.x, visionZone.y, visionZone.width, visionZone.height);

  ctx.fillStyle = "#facc15";
  ctx.beginPath();
  ctx.arc(390, 70, 35, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(390, 70, 14, 0, Math.PI * 2);
  ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();

  ctx.fillStyle = "#22c55e";
  ctx.fillRect(goal.x, goal.y, goal.width, goal.height);

  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Visibility", 20, 30);

  ctx.strokeStyle = "white";
  ctx.strokeRect(120, 12, 160, 22);

  ctx.fillStyle = visibility > 70 ? "red" : "#facc15";
  ctx.fillRect(120, 12, visibility * 1.6, 22);

  if (gameState === "gameOver") {
    drawMessage("SEEN", "Press R to Restart");
  }

  if (gameState === "win") {
    drawMessage("YOU ESCAPED", "Press R to Play Again");
  }
}

function drawMessage(title, subtitle) {
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  ctx.font = "48px Arial";
  ctx.fillText(title, canvas.width / 2, 180);

  ctx.font = "24px Arial";
  ctx.fillText(subtitle, canvas.width / 2, 230);

  ctx.textAlign = "left";
}

function restartGame() {
  player.x = 40;
  visibility = 0;
  gameState = "playing";
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
