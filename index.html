<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dodge Da Block</title>

  <style>
    body {
      margin: 0;
      background: #101820;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 15px;
    }

    canvas {
      background: #1f2933;
      display: block;
      margin: 20px auto;
      border: 3px solid white;
    }
  </style>
</head>

<body>

<!-- AI Attribution: ChatGPT was used to help generate/debug this game. -->

<h1>Dodge Da Block</h1>
<p>Move with ← and → keys. Press R to restart.</p>

<canvas id="gameCanvas" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x: 225,
  y: 540,
  width: 50,
  height: 50,
  speed: 7
};

let blocks = [];
let keys = {};
let score = 0;
let gameOver = false;
let spawnTimer = 0;

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;

  if (e.key.toLowerCase() === "r" && gameOver) {
    restartGame();
  }
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

function spawnBlock() {
  const size = Math.random() * 35 + 25;

  blocks.push({
    x: Math.random() * (canvas.width - size),
    y: -size,
    width: size,
    height: size,
    speed: Math.random() * 3 + 3
  });
}

function update() {
  if (gameOver) return;

  if (keys["ArrowLeft"] && player.x > 0) {
    player.x -= player.speed;
  }

  if (keys["ArrowRight"] && player.x + player.width < canvas.width) {
    player.x += player.speed;
  }

  spawnTimer++;

  if (spawnTimer > 35) {
    spawnBlock();
    spawnTimer = 0;
  }

  for (let block of blocks) {
    block.y += block.speed;

    if (
      player.x < block.x + block.width &&
      player.x + player.width > block.x &&
      player.y < block.y + block.height &&
      player.y + player.height > block.y
    ) {
      gameOver = true;
    }
  }

  blocks = blocks.filter(block => block.y < canvas.height);

  score++;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = "red";

  for (let block of blocks) {
    ctx.fillRect(block.x, block.y, block.width, block.height);
  }

  ctx.fillStyle = "white";
  ctx.font = "24px Arial";
  ctx.fillText("Score: " + score, 20, 35);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("Game Over", 140, 270);

    ctx.font = "24px Arial";
    ctx.fillText("Press R to Restart", 130, 330);
  }
}

function restartGame() {
  player.x = 225;
  blocks = [];
  score = 0;
  spawnTimer = 0;
  gameOver = false;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
